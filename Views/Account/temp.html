<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Columns Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row min-vh-100">
        
        <!-- Left Column (75%) -->
        <div class="col-md-9 bg-success text-white p-4">
            <h2>Left Column</h2>
            <p>This column takes 75% of the width.</p>
        </div>

        <!-- Right Column (25%) -->
        <div class="col-md-3 bg-white p-4 border-start">
            <h2>Right Column</h2>
            <p>This column takes 25% of the width.</p>
        </div>

    </div>
</div>

</body>
</html>
